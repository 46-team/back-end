name: Test backend on errors

on:
  pull_request:
    branches:
      - dev1
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to test (manual run only)"
        required: true
        default: dev1

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Determine branch
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}

      - name: Setup latest Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run app (5s timeout)
        env:
          SERVER_DB_IP: ${{ secrets.SERVER_DB_IP }}
          SERVER_DB_NAME: ${{ secrets.SERVER_DB_NAME }}
          SERVER_DB_PASSWORD: ${{ secrets.SERVER_DB_PASSWORD }}
          SERVER_DB_PORT: ${{ secrets.SERVER_DB_PORT }}
          SERVER_DB_USERNAME: ${{ secrets.SERVER_DB_USERNAME }}
        run: |
          timeout 5s python main.py || code=$?

          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            exit $code
          fi
